
name: widget-server-pipe

on:
  push:
    branches:
      - main

jobs:
  build:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        id: checkout 
        uses: actions/checkout@v4


      - name: Configure Node.js
        id: configure-node
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Configure pnpm
        id: configure-pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Install dependencies
        id: install-dependencies
        run: |
          pnpm install

      - name: Configure AWS Credentials
        id: configure-aws-credentials
        uses: aws-actions/configure-aws-credentials@v6.0.0
        with:
          # estou usando WS_ACCESS_KEY_ID ao invés de AWS_ACCESS_KEY_ID porque
          # coloquei errado no github e iria demorar para corrigir, então deixei assim mesmo
          aws-access-key-id: ${{ secrets.WS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.WS_SECRET_ACCESS_KEY }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name : Set up Docker Buildx
        id: set-up-docker-buildx
        uses: docker/setup-buildx-action@v4

      - name: Generate tag
        id: generate-tag
        run : | 
          SHA=$(echo $GITHUB_SHA | head -c7)
          echo "sha=$SHA" >> $GITHUB_OUTPUT

      - name: Build and Export Image
        id: build-and-export-image
        uses: docker/build-push-action@v6
        with:
          context: .
          load: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: | 
             ${{ steps.login-ecr.outputs.registry }}/${{vars.ECR_REPOSITORY}}:test

      - name: Install Trivy CLI
        id: install-trivy
        run: |
          wget -qO - https://aquasecurity.github.io/trivy-repo/deb/public.key | sudo apt-key add -
          echo "deb https://aquasecurity.github.io/trivy-repo/deb $(lsb_release -sc) main" | sudo tee -a /etc/apt/sources.list.d/trivy.list
          sudo apt-get update
          sudo apt-get install -y trivy
          trivy --version

      - name: Run Trivy scanner (CLI)
        id: run-trivy-scanner
        run: |
          trivy image \
            --format table \
            --exit-code 1 \
            --ignore-unfixed \
            --vuln-type os,library \
            --severity CRITICAL,HIGH,MEDIUM,LOW \
            ${{ steps.login-ecr.outputs.registry }}/${{vars.ECR_REPOSITORY}}:test

      - name: Build and Push the image to AWS ECR
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          cache-from: type=gha
          tags: | 
             ${{ steps.login-ecr.outputs.registry }}/${{vars.ECR_REPOSITORY}}:${{ steps.generate-tag.outputs.sha }}

    # - name: Build and Push the image to AWS ECR
